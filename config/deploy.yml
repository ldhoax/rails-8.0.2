# Name of your application. Used to uniquely configure containers.
service: my_application

# Name of the container image.
image: your-api

# Deploy to these servers.
servers:
  web:
    - <%= ENV["EC2_INSTANCE_IP"] %>
  # sidekiq:
  #   hosts:
  #     - <%= ENV["EC2_INSTANCE_IP"] %>
  #   cmd: bundle exec sidekiq -C config/sidekiq.yml

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# Remove this section when using multiple web servers and ensure you terminate SSL at your load balancer.
#
# Note: If using Cloudflare, set encryption mode in SSL/TLS setting to "Full" to enable CF-to-app encryption.
proxy:  
  ssl: false
  host: <%= ENV["APP_HOST"] %>
  app_port: 3000

# Credentials for your image host.
registry:
  server: <%= ENV["ECR_REPOSITORY_URL"].split('/')[0] %>
  username: AWS
  password: <%= ENV["ECR_PASSWORD"] %>

# Configure builder setup.
builder:
  arch: amd64
  args:
    RUBY_VERSION: <%= ENV["RBENV_VERSION"] %>
  cache:
    type: gha
    options: mode=max
    image: rails-build-cache

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  clear:
    RAILS_ENV: production
    RAILS_SERVER_PORT: 3000
    BUNDLE_PATH: /usr/local/bundle
    BUNDLE_WITHOUT: development:test
  secret:
    - RAILS_MASTER_KEY
    - DB_HOST
    - DB_NAME
    - DB_USERNAME
    - DB_PASSWORD
    - DB_PORT
    - REDIS_URL
    - AWS_REGION
    - AWS_BUCKET
    - APP_HOST
    - JWT_SECRET_KEY
    - SMTP_HOST
    - SMTP_PORT
    - SMTP_USERNAME
    - SMTP_PASSWORD
    - SWAGGER_AUTH_USERNAME
    - SWAGGER_AUTH_PASSWORD
    - ECR_REPOSITORY_URL
    - EC2_INSTANCE_IP
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal app logs -r job" will tail logs from the first server in the job section.
#
# aliases:
#   shell: app exec --interactive --reuse "bash"

# Use a different ssh user than root
ssh:
  user: ubuntu
  keys:
    - infrastructure/your-ec2-key.pem

# Use a persistent storage volume.
volumes:
  - "your_storage:/app/storage"
  - netdata_config
  - netdata_lib
  - netdata_cache

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

builder:
  arch: amd64

  # # Build image via remote server (useful for faster amd64 builds on arm64 computers)
  # remote: ssh://docker@docker-builder-server
  #
  # # Pass arguments and secrets to the Docker build process
  # args:
  #   RUBY_VERSION: ruby-3.4.4
  # secrets:
  #   - GITHUB_TOKEN
  #   - RAILS_MASTER_KEY

# Use a different ssh user than root
# ssh:
#   user: app

# Use accessory services (secrets come from .kamal/secrets).
accessories:
  netdata:
    image: netdata/netdata:latest
    host: <%= ENV["EC2_INSTANCE_IP"] %>
    port: 19999
    volumes:
      - netdata_config:/etc/netdata
      - netdata_lib:/var/lib/netdata
      - netdata_cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
    env:
      clear:
        DO_NOT_TRACK: "1"
        NETDATA_CLAIM_TOKEN: ""
        NETDATA_CLAIM_URL: ""
        NETDATA_CLAIM_ROOMS: ""
      secret: []
    options:
      cap-add: SYS_PTRACE
      security-opt: apparmor=unconfined
